<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Interativo — Ascensão Artemis SLS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Libre+Franklin:ital,wght@0,300;0,400;0,600;0,700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f1117;
      --ink-mid: #2e3444;
      --ink-light: #5a6278;
      --paper: #f7f5f0;
      --accent: #1b4f8a;
      --fire: #c94b1e;
      --gold: #d4870a;
      --steam: #5ba3c9;
      --green: #2d7a4e;
      --rule: rgba(15,17,23,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 32px;
      background: #fff;
      border-bottom: 1px solid var(--rule);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { height: 34px; width: auto; }
    .topbar-brand { font-weight: 700; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-light); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--ink-light); font-size: 12px;
      text-decoration: none; letter-spacing: .08em;
      transition: color .18s;
    }
    .back-btn:hover { color: var(--ink); }

    /* HERO STRIP */
    .hero-strip {
      padding: 40px 32px 28px;
      border-bottom: 1px solid var(--rule);
      background: #fff;
    }
    .hero-strip h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      line-height: 1.15; margin-bottom: 8px;
    }
    .hero-strip h1 em { font-style: italic; color: var(--gold); }
    .hero-strip p { font-size: .9rem; color: var(--ink-light); max-width: 600px; }

    /* MAIN LAYOUT */
    .main { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 140px); }
    @media (max-width: 760px) { .main { grid-template-columns: 1fr; } }

    /* PHASE SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--rule); background: #fff;
      padding: 24px 0;
      position: sticky; top: 0; height: calc(100vh - 60px);
      overflow-y: auto; scrollbar-width: thin;
    }
    .sidebar-title {
      font-size: 9px; font-weight: 700; letter-spacing: .22em;
      text-transform: uppercase; color: var(--ink-light);
      padding: 0 20px 12px;
    }
    .phase-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; width: 100%;
      background: none; border: none; cursor: pointer;
      text-align: left; transition: background .15s;
      border-left: 3px solid transparent;
    }
    .phase-btn:hover { background: var(--paper); }
    .phase-btn.active {
      background: #fdf0ec;
      border-left-color: var(--fire);
    }
    .pb-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    .pb-label { font-size: .82rem; color: var(--ink-mid); line-height: 1.35; }
    .pb-time { font-size: .72rem; color: var(--ink-light); font-family: 'Source Code Pro', monospace; }
    .phase-btn.active .pb-label { color: var(--ink); font-weight: 600; }

    /* CONTENT PANEL */
    .content { padding: 32px 36px; overflow-y: auto; background: var(--paper); }
    @media (max-width: 760px) { .sidebar { height: auto; position: static; } .content { padding: 24px 20px; } }

    .phase-panel { display: none; }
    .phase-panel.active { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .panel-header { margin-bottom: 28px; }
    .panel-phase-tag {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--fire); margin-bottom: 10px;
    }
    .panel-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      line-height: 1.2; margin-bottom: 6px;
    }
    .panel-alt {
      font-size: .8rem; color: var(--ink-light);
      font-family: 'Source Code Pro', monospace;
    }

    /* PARAM GRID */
    .param-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px; margin: 24px 0;
    }
    .param-card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 8px; padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .param-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
    }
    .param-card.p-force::before   { background: var(--fire); }
    .param-card.p-heat::before    { background: #e8760a; }
    .param-card.p-pressure::before{ background: var(--steam); }
    .param-card.p-velocity::before{ background: var(--gold); }
    .param-card.p-flow::before    { background: var(--green); }
    .param-card.p-thermal::before { background: #a855f7; }

    .param-label {
      font-size: 9px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-light);
      margin-bottom: 6px;
    }
    .param-value {
      font-family: 'Source Code Pro', monospace;
      font-size: 1.4rem; font-weight: 600;
      color: var(--ink); line-height: 1; margin-bottom: 4px;
    }
    .param-unit { font-size: .72rem; color: var(--ink-light); margin-bottom: 8px; }
    .param-desc { font-size: .78rem; color: var(--ink-light); line-height: 1.5; }

    /* BAR CHART */
    .bar-wrap { margin: 6px 0 4px; }
    .bar-track {
      height: 4px; background: rgba(0,0,0,.08);
      border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 2px;
      transition: width .6s ease;
    }

    /* CHALLENGE BOX */
    .challenge-box {
      background: #fdf0ec;
      border: 1px solid rgba(201,75,30,.25);
      border-radius: 8px; padding: 18px 22px;
      margin: 24px 0;
    }
    .challenge-tag {
      font-size: 9px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--fire); margin-bottom: 8px;
    }
    .challenge-list {
      list-style: none; display: flex; flex-direction: column; gap: 8px;
    }
    .challenge-list li {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: .84rem; color: var(--ink-mid); line-height: 1.55;
    }
    .challenge-list li::before {
      content: '→'; color: var(--fire); flex-shrink: 0; font-weight: 700;
    }

    /* EQUATION INLINE */
    .eq-inline {
      background: var(--ink);
      border-radius: 5px; padding: 10px 16px;
      font-family: 'Source Code Pro', monospace;
      font-size: .88rem; color: rgba(255,255,255,.85);
      margin: 12px 0; line-height: 1.7;
    }

    /* COMPARE ROW (vs corpo humano) */
    .compare-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: center; margin: 20px 0;
    }
    .cmp-box {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 6px; padding: 14px 16px;
    }
    .cmp-box h4 {
      font-size: 9px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .cmp-box.rocket h4 { color: var(--fire); }
    .cmp-box.body h4   { color: var(--steam); }
    .cmp-val { font-family: 'Source Code Pro', monospace; font-size: 1.1rem; color: var(--ink); }
    .cmp-sep { text-align: center; font-size: .7rem; color: rgba(255,255,255,.3); }
    .cmp-ratio { font-weight: 700; font-size: .85rem; color: var(--gold); margin-top: 4px; }

    /* TIMELINE MINI */
    .mini-tl { display: flex; gap: 0; overflow-x: auto; padding-bottom: 0; background:#fff; border-bottom: 1px solid var(--rule); }
    .mtl-seg {
      flex: 1; min-width: 80px;
      padding: 10px 12px;
      border-right: 1px solid var(--rule); background: #fff;
      cursor: pointer; transition: background .15s;
    }
    .mtl-seg:last-child { border-right: none; }
    .mtl-seg:hover { background: var(--paper); }
    .mtl-seg.cur { background: #fdf0ec; }
    .mtl-t { font-family: 'Source Code Pro', monospace; font-size: .7rem; color: var(--ink-light); }
    .mtl-name { font-size: .75rem; font-weight: 600; color: var(--ink-mid); margin-top: 3px; }
    .mtl-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }

    /* FOOTER */
    .panel-footer {
      margin-top: 32px; padding-top: 20px;
      border-top: 1px solid var(--rule);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .panel-footer span { font-size: .75rem; color: var(--ink-light); }
    .nav-btns { display: flex; gap: 10px; }
    .nav-btn {
      background: var(--paper); border: 1px solid var(--rule);
      color: var(--ink-mid); border-radius: 5px;
      padding: 8px 16px; font-size: .8rem; cursor: pointer;
      font-family: 'Libre Franklin', sans-serif;
      transition: background .15s;
    }
    .nav-btn:hover { background: #e8eef6; color: var(--accent); border-color: var(--accent); }
    .nav-btn:disabled { opacity: .3; cursor: default; }

    /* PHASE IMAGE */
    .phase-img-wrap {
      margin: 0 0 28px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--rule);
      position: relative;
    }
    .phase-img-wrap img {
      width: 100%; height: auto;
      display: block;
    }
    .phase-img-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, var(--paper-warm) 0%, #e0dcd4 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--ink-light);
    }
    .phase-img-placeholder .ph-fname {
      font-family: 'Source Code Pro', monospace;
      font-size: .78rem; background: rgba(0,0,0,.08);
      padding: 4px 12px; border-radius: 3px; color: var(--ink-mid);
    }
    .phase-img-caption {
      padding: 8px 14px;
      font-size: .75rem; color: var(--ink-light);
      border-top: 1px solid var(--rule);
      background: #fff;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <img src="img/logo.png" alt="UFPel Rocket Team" class="topbar-logo">
    <span class="topbar-brand">UFPel Rocket Team 2026</span>
  </div>
  <a href="index.html" class="back-btn">
    ← Voltar ao Guia Técnico
  </a>
</header>

<!-- HERO STRIP -->
<div class="hero-strip">
  <h1>Parâmetros da Ascensão — <em>Ignição ao Escape</em></h1>
  <p>Selecione uma fase para ver como variam força, calor, pressão e velocidade — e quais desafios físicos dominam cada instante da ascensão do Artemis SLS.</p>
</div>

<!-- MINI TIMELINE -->
<div style="padding: 0 32px;">
  <div class="mini-tl" id="miniTl"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-title">Fases do Lançamento</div>
    <div id="sidebarBtns"></div>
  </nav>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

</div>

<script>

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
let current = 0;

function barColor(cls) {
  const map = { 'p-force':'#c94b1e','p-heat':'#e8760a','p-pressure':'#5ba3c9','p-velocity':'#d4870a','p-flow':'#2d7a4e','p-thermal':'#a855f7' };
  return map[cls] || '#fff';
}

function renderSidebar() {
  const el = document.getElementById('sidebarBtns');
  el.innerHTML = phases.map((p,i) => `
    <button class="phase-btn ${i===current?'active':''}" onclick="goto(${i})">
      <span class="pb-dot" style="background:${p.dot}"></span>
      <div>
        <div class="pb-label">${p.name}</div>
        <div class="pb-time">${p.time} · ${p.alt.split('·')[0].trim()}</div>
      </div>
    </button>
  `).join('');
}

function renderMiniTl() {
  const el = document.getElementById('miniTl');
  el.innerHTML = phases.map((p,i) => `
    <div class="mtl-seg ${i===current?'cur':''}" onclick="goto(${i})">
      <div class="mtl-dot" style="background:${p.dot}"></div>
      <div class="mtl-t">${p.time}</div>
      <div class="mtl-name">${p.name.split('—')[0].trim()}</div>
    </div>
  `).join('');
}

function renderContent() {
  const p = phases[current];
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="phase-panel active">
      <div class="phase-img-wrap">
        <img src="${p.img}" alt="${p.name}"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
          style="width:100%; height:auto; display:block;">
        <div class="phase-img-placeholder" style="display:none;">
          <span style="font-size:2rem;">🖼</span>
          <span class="ph-fname">${p.img}</span>
          <span style="font-size:.78rem; font-style:italic; color:var(--ink-light);">Adicione a imagem na pasta img/</span>
        </div>
        <div class="phase-img-caption">📷 ${p.imgcaption}</div>
      </div>
      <div class="panel-header">
        <div class="panel-phase-tag">${p.tag}</div>
        <h2>${p.name}</h2>
        <div class="panel-alt">📍 ${p.alt}</div>
      </div>

      <div class="param-grid">
        ${p.params.map(pm => `
          <div class="param-card ${pm.cls}">
            <div class="param-label">${pm.label}</div>
            <div class="param-value">${pm.value}</div>
            <div class="param-unit">${pm.unit}</div>
            <div class="bar-wrap">
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(pm.bar*100)}%; background:${barColor(pm.cls)};"></div>
              </div>
            </div>
            <div class="param-desc">${pm.desc}</div>
          </div>
        `).join('')}
      </div>

      <div class="challenge-box">
        <div class="challenge-tag">⚠ Desafios Físicos desta Fase</div>
        <ul class="challenge-list">
          ${p.challenges.map(c => `<li>${c}</li>`).join('')}
        </ul>
      </div>

      <div class="eq-inline">${p.eq}</div>

      <div class="compare-row">
        <div class="cmp-box rocket">
          <h4>🚀 Foguete</h4>
          <div class="cmp-val">${p.body_cmp.rocket}</div>
        </div>
        <div class="cmp-sep">${p.body_cmp.label}<br>vs.</div>
        <div class="cmp-box body">
          <h4>🩺 Corpo Humano</h4>
          <div class="cmp-val">${p.body_cmp.human}</div>
          <div class="cmp-ratio">${p.body_cmp.ratio}</div>
        </div>
      </div>

      <div class="panel-footer">
        <span>UFPel Rocket Team 2026 · G10 Feridas Crônicas · PET-Saúde/UFPel</span>
        <div class="nav-btns">
          <button class="nav-btn" onclick="goto(${current-1})" ${current===0?'disabled':''}>← Fase anterior</button>
          <button class="nav-btn" onclick="goto(${current+1})" ${current===phases.length-1?'disabled':''}>Próxima fase →</button>
        </div>
      </div>
    </div>
  `;
}

function goto(i) {
  if (i < 0 || i >= phases.length) return;
  current = i;
  renderSidebar();
  renderMiniTl();
  renderContent();
  document.querySelector('.content').scrollTop = 0;
}

// INIT
renderSidebar();
renderMiniTl();
renderContent();
</script>
</body>
</html>
